# Use the repo Dockerfile so `npm run build` runs and `static/spa/` is populated
# before `collectstatic` (avoids empty/broken SPA on Nixpacks-only Python builds).
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# Run DB migrations once per deploy (before new containers take traffic).
# See: https://docs.railway.com/deployments/pre-deploy-command
[deploy]
preDeployCommand = ["python", "manage.py", "migrate", "--noinput"]
healthcheckPath = "/healthz"
